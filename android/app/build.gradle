plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.corsairlabs.freefall"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.corsairlabs.freefall"
        // Phase 16: pin the SDK floor + ceiling. Min 21 covers ~99% of
        // active Android devices; target 35 is the current Play Store
        // requirement (was 34 — bumped per Play Console error).
        minSdk = 21
        targetSdk = 35
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            // Phase 16: every secret reads from an env var so CI can
            // inject the keystore + password without committing them.
            // Falls back to "" so a `flutter build` on a dev box that
            // doesn't have the env set just fails clean (instead of
            // mis-signing with empty values + producing an installable
            // APK that we couldn't track).
            storeFile = file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
            storePassword = System.getenv("KEYSTORE_PASS") ?: ""
            keyAlias = System.getenv("KEY_ALIAS") ?: "freefall"
            keyPassword = System.getenv("KEY_PASS") ?: ""
        }
    }

    buildTypes {
        release {
            // Phase 16: production signing + R8 minify + ProGuard
            // rules tuned for the Flame / Firebase / AdMob / IAP
            // packages we ship with. See proguard-rules.pro for the
            // keep rules.
            signingConfig = signingConfigs.release
            minifyEnabled = true
            shrinkResources = true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
        debug {
            // Debug stays on the debug keystore so `flutter run` works
            // without any environment setup.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
