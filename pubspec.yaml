name: freefall
description: Freefall - an infinite falling arcade game
publish_to: 'none'
version: 1.0.10+10

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.0
  sensors_plus: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  games_services: ^4.0.1
  share_plus: ^12.0.2
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
