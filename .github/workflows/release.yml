name: Release to Play Store

# Phase-16 release pipeline. Fires on a `v*` tag (e.g. `v1.0.0`)
# pushed to main. Builds a signed App Bundle and uploads it to the
# Play Console's internal-testing track. Promotion to closed/open
# testing or production is a manual step in Play Console — see
# RELEASE_CHECKLIST.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build + upload signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter / Dart versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test

      - name: Decode upload keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Build release AAB
        run: flutter build appbundle --release
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}

      - name: Upload AAB artifact (CI download)
        uses: actions/upload-artifact@v4
        with:
          name: freefall-${{ github.ref_name }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      # NOTE: PLAY_SERVICE_ACCOUNT_JSON must be set as a GitHub Actions
      # repository secret before the first tagged release. Until then,
      # the build + AAB artifact steps still run successfully.
      - name: Upload to Play Store (Internal track)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.corsairlabs.freefall
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          whatsNewDirectory: distribution/whatsnew
          status: completed
