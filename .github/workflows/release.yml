name: Release to Play Store

# Phase-16 release pipeline. Fires on every push to main.
# Builds a signed App Bundle and uploads it to the Play Console's
# internal-testing track. Promotion to closed/open testing or
# production is a manual step in Play Console — see RELEASE_CHECKLIST.md.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Build + upload signed AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter / Dart versions
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test

      - name: Decode upload keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Build release AAB
        # --build-number is evaluated by GitHub Actions before the shell runs,
        # so the versionCode is guaranteed correct regardless of pubspec.yaml.
        # Offset of 10000 ensures the code is always above any prior manual uploads.
        run: flutter build appbundle --release --build-number=$(( ${{ github.run_number }} + 10000 ))
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}

      - name: Upload AAB artifact (CI download)
        uses: actions/upload-artifact@v4
        with:
          name: freefall-${{ github.ref_name }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Google Play Internal Testing
        if: github.ref == 'refs/heads/main'
        run: |
          pip install google-api-python-client google-auth --quiet
          python3 << 'PYEOF'
          import json, os, sys
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account
          service_account_json = os.environ["PLAY_STORE_SERVICE_ACCOUNT_JSON"].strip()
          # strict=False allows actual newlines/control chars in string values (common GitHub secret issue)
          # Also try replacing literal \n sequences since some tools store them that way
          try:
              creds_dict = json.loads(service_account_json, strict=False)
          except json.JSONDecodeError:
              creds_dict = json.loads(service_account_json.replace('\\n', '\n'), strict=False)
          creds = service_account.Credentials.from_service_account_info(
              creds_dict, scopes=["https://www.googleapis.com/auth/androidpublisher"]
          )
          service = build("androidpublisher", "v3", credentials=creds)
          package = "com.corsairlabs.freefall"
          edit = service.edits().insert(body={}, packageName=package).execute()
          edit_id = edit["id"]
          aab_path = "build/app/outputs/bundle/release/app-release.aab"
          media = MediaFileUpload(aab_path, mimetype="application/octet-stream")
          bundle = service.edits().bundles().upload(packageName=package, editId=edit_id, media_body=media).execute()
          print(f"Uploaded bundle: {bundle['versionCode']}")
          service.edits().tracks().update(packageName=package, editId=edit_id, track="internal", body={
              "track": "internal",
              "releases": [{"status": "completed", "versionCodes": [str(bundle["versionCode"])]}]
          }).execute()
          service.edits().commit(packageName=package, editId=edit_id).execute()
          print("Successfully published to internal testing")
          PYEOF
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
